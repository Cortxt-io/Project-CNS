# DocsWatch - changelog and docs pages to monitor
# Add URLs for external documentation, changelogs, and release notes.

urls:
  - label: "Stripe API changelog"
    url: "https://stripe.com/docs/changelog"

  - label: "Vercel changelog"
    url: "https://vercel.com/changelog"

  - label: "Shopify dev changelog"
    url: "https://shopify.dev/changelog"

  - label: "Linear changelog"
    url: "https://linear.app/changelog"

  - label: "GitHub changelog"
    url: "https://github.blog/changelog/"

# Noise filter settings (all optional, shown with defaults)
filters:
  min_change_chars: 10          # Ignore diffs shorter than this
  ignore_whitespace_only: true  # Skip whitespace-only changes
  ignore_timestamp_patterns: true  # Strip common date/time patterns before comparing
