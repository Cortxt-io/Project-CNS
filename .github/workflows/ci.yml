name: CI

# The gate that decisions/git-github-grund (Beslut 3) already assumed existed: "PR + grön CI
# krävs för allt". It did not — until now the repo had only cron jobs, so a PR could be green
# without a single test running. A rule with no mechanism behind it is folklore.
#
# Two checks, and they answer different questions:
#   pytest      — does the code do what we think?
#   prose_check — does the prose still tell the truth about the code?
# The second one exists because the first cannot catch a skill that runs a script we deleted,
# or a CLAUDE.md that describes a CLI we rewrote. Those lie silently, and silence is the point.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # requirements-dev.txt pulls in requirements.txt and adds pytest + fakeredis. Test deps are
      # declared, not installed ad-hoc — the previous version pip-installed pytest here by hand and
      # left fakeredis undeclared entirely, which is how test_lease_store ended up running nowhere.
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # tests/frozen/ (the agency layer) is excluded via pytest.ini, not here — one declared
      # boundary instead of a growing list of CI flags.
      #
      # test_lease_store used to be skipped with --ignore because fakeredis was missing. A test
      # that runs nowhere is not a test, it is a comment: the lease store was untested locally AND
      # in CI while the build reported green. It runs now.
      - name: Tests
        run: python -m pytest tests/ -q

      # cortxt är den andra ytan jag läser varje session, och den var ogrindad fram till 2026-07-13:
      # dess CLAUDE.md påstod i en månad att den parkerade dashboarden "rivs inte" och att auth var
      # ett kommande arbetspaket — båda döda. Repot är publikt, så det kostar ingen hemlighet att
      # hålla dess prosa mot dess egen källa. Roten är ett argument; varje fil hålls mot SITT repo.
      - name: Checkout cortxt (sibling repo, for the prose gate)
        uses: actions/checkout@v4
        with:
          repository: Cortxt-io/cortxt
          path: _cortxt

      - name: Prose freshness (this repo + cortxt)
        run: python scripts/prose_check.py --root . --root _cortxt

      # The vault owns skills and memories; .claude/skills/ and ~/.claude/.../memory/ are derived
      # artifacts. These gates fail if someone hand-edited an export — otherwise "one direction" is
      # a hope, not a guarantee, and the two descriptions drift apart in silence.
      #
      # FAIL CLOSED (2026-07-13). This step used to be wrapped in `if [ -d "$CORTXT_VAULT_PATH" ]`,
      # and that variable was never set in CI — the vault is a separate private repo and was never
      # checked out. So the gate skipped itself on every run and the build went green having looked
      # at nothing. That is the same false green prose_check had this morning, and it is worse than
      # having no gate: a gate that reports OK teaches you to stop checking.
      #
      # The vault is now checked out with PAT_TOKEN. If that fails, CI fails. Absence of the source
      # is not evidence of drift — but it IS absence of proof, and a gate must not report proof it
      # does not have.
      - name: Checkout vault (private — the source of skills and memories)
        uses: actions/checkout@v4
        with:
          repository: Cortxt-io/vault
          token: ${{ secrets.PAT_TOKEN }}
          path: _vault

      # KÄND RÄCKVIDD: bara `cns`-målet (lab/.claude/skills/) är versionerat här och kan grindas.
      # De tolv workspace-skillsen exporteras till Cortxt-io/.claude/ — en maskinlokal katalog som
      # inte ligger i något repo, och som CI därför aldrig kan se. Den checken är lokal. Det är en
      # verklig lucka, och den skrivs ut här hellre än att döljas bakom ett grönt kryss.
      - name: Skill export drift
        env:
          CORTXT_VAULT_PATH: ${{ github.workspace }}/_vault
        run: python lab/cns_lab.py skill-export --check
