name: CI

# The gate that decisions/git-github-grund (Beslut 3) already assumed existed: "PR + grön CI
# krävs för allt". It did not — until now the repo had only cron jobs, so a PR could be green
# without a single test running. A rule with no mechanism behind it is folklore.
#
# Two checks, and they answer different questions:
#   pytest      — does the code do what we think?
#   prose_check — does the prose still tell the truth about the code?
# The second one exists because the first cannot catch a skill that runs a script we deleted,
# or a CLAUDE.md that describes a CLI we rewrote. Those lie silently, and silence is the point.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # requirements-dev.txt pulls in requirements.txt and adds pytest + fakeredis. Test deps are
      # declared, not installed ad-hoc — the previous version pip-installed pytest here by hand and
      # left fakeredis undeclared entirely, which is how test_lease_store ended up running nowhere.
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # tests/frozen/ (the agency layer) is excluded via pytest.ini, not here — one declared
      # boundary instead of a growing list of CI flags.
      #
      # test_lease_store used to be skipped with --ignore because fakeredis was missing. A test
      # that runs nowhere is not a test, it is a comment: the lease store was untested locally AND
      # in CI while the build reported green. It runs now.
      - name: Tests
        run: python -m pytest tests/ -q

      - name: Prose freshness
        run: python scripts/prose_check.py

      # The vault owns skills; .claude/skills/ is a derived artifact. This gate fails if someone
      # hand-edited an export — otherwise "one direction" is a hope, not a guarantee, and the two
      # descriptions drift apart in silence. Skipped when the vault isn't checked out (it's a
      # separate private repo), because absence of the source is not evidence of drift.
      - name: Skill export drift
        run: |
          if [ -d "$CORTXT_VAULT_PATH" ]; then
            python lab/cns_lab.py skill-export --check
          else
            echo "No vault checked out — skipping skill drift gate."
          fi
