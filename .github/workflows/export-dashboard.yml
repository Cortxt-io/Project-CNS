name: Export Dashboard

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Export projects.json
        run: python cns.py export json --output projects/project-vault-dashboard/dashboard/data/projects.json

      - name: Run devwatch
        run: python cns.py devwatch

      - name: Copy latest devwatch export
        run: |
          LATEST=$(ls exports/devwatch_*.json 2>/dev/null | sort | tail -n 1)
          if [ -n "$LATEST" ]; then
            cp "$LATEST" projects/project-vault-dashboard/dashboard/data/devwatch_latest.json
            echo "Copied $LATEST"
          else
            echo "No devwatch export found — skipping"
          fi

      - name: Commit updated projects.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/project-vault-dashboard/dashboard/data/projects.json
          git add projects/project-vault-dashboard/dashboard/data/devwatch_latest.json
          git add .devwatch_state.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update projects.json $(date +%Y-%m-%d)"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: projects/project-vault-dashboard/dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
