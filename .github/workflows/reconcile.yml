name: Reconcile

# Katalogen mot verkligheten — var 6:e timme.
#
# VARFÖR CRON OCH INTE EN CI-LINT: CI triggar på commits. Men Vercel, Railway och repona driver
# på sin EGEN klocka — en katalog som bara regenereras vid push ljuger mellan pushar. Backstage
# kör en kontinuerlig processing-loop av precis det skälet.
#
# Jobbet KRÖNER INGENTING. Det skriver catalog.generated.yaml BREDVID catalog.yaml och committar
# diffen. Diffen i git ÄR driftloggen: den visar när verkligheten rörde sig. Flippen (att
# load_catalog läser den genererade filen) görs för hand, när diffen granskats och är ren.
#
# Detta ersätter export-dashboard.yml, vars cron failade 6/6 körningar i tysthet.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Checka ut CNS
        uses: actions/checkout@v4

      # BEVISKÄLLORNA. Utan dem mäter reconcile inte verkligheten — den mäter sin egen blindhet.
      #
      # Första körningen var GRÖN och rapporterade "0 motsägelser" enbart för att tre av fyra
      # repon och hela vaulten saknades. `|| echo "hoppade över"` svalde felet. Nu klonar vi
      # högt: misslyckas en klon ska det synas i loggen, och reconcile FAILAR sedan på blindheten
      # (den har en egen grind för det — se Report.is_blind).
      #
      # CNS_GITHUB_TOKEN måste ha läsaccess till Cortxt-io:s privata repon. Har den inte det är
      # det en secret att laga, inte ett steg att tysta.
      - name: Checka ut vertikalerna (beviset)
        run: |
          for repo in orgkomp juvahem bkfinans crusade; do
            if git clone --depth 1 --quiet \
              "https://x-access-token:${{ secrets.CNS_GITHUB_TOKEN }}@github.com/Cortxt-io/$repo.git" \
              "../$repo"; then
              echo "::notice::klonade $repo"
            else
              echo "::warning::kunde INTE klona $repo — dess steg blir omätbara (token saknar access?)"
            fi
          done

      # Vaulten bär OMDÖMET (kill-kriterier, grindbeslut). Utan den är hela den halvan blind.
      - name: Checka ut vaulten (omdömet)
        run: |
          if git clone --depth 1 --quiet \
            "https://x-access-token:${{ secrets.CNS_GITHUB_TOKEN }}@github.com/Cortxt-io/vault.git" \
            "../vault"; then
            echo "::notice::vault klonad"
          else
            echo "::warning::kunde INTE klona vaulten — HELA omdömeslagret är osynligt"
          fi

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installera beroenden
        run: pip install -r requirements.txt

      # Reconcile failar (exit 1) om beviskällor saknades. Det är avsiktligt: ett blint jobb får
      # inte rapportera hälsa. `continue-on-error` så vi hinner publicera rapporten först — men
      # jobbet markeras rött efteråt.
      - name: Kör reconcile
        id: reconcile
        continue-on-error: true
        env:
          CORTXT_VAULT_PATH: ${{ github.workspace }}/../vault
        run: |
          # pipefail är INTE valfritt här. En pipeline returnerar exit-koden från det SISTA
          # kommandot, och `tee` lyckas alltid — så utan detta sväljer röret reconciles exit 1
          # och den blinda körningen rapporteras som success igen. Ärlighetsgrinden tystad av
          # ett rör: samma bugg-klass som den finns för att fånga, en nivå ner.
          set -o pipefail
          python lab/cns_lab.py reconcile --apply | tee reconcile-report.md

      - name: Committa den genererade katalogen om verkligheten rört sig
        if: steps.reconcile.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.generated.yaml
          if git diff --cached --quiet; then
            echo "Ingen drift — verkligheten står still."
          else
            git commit -m "chore(reconcile): verkligheten rörde sig $(date -u +%Y-%m-%d)"
            git push
          fi

      # Rapporten hamnar i körningens sammanfattning — den ska INTE bara ligga i en logg ingen
      # öppnar. En upptäckt som inte syns är samma sak som ingen upptäckt.
      - name: Publicera rapporten
        if: always()
        run: cat reconcile-report.md >> "$GITHUB_STEP_SUMMARY"

      # En blind körning ska vara RÖD. Ett grönt kryss betyder "vi såg efter och allt var väl" —
      # inte "vi kunde inte se". Att låta blindheten passera som success vore att bygga precis
      # den tysta lögn hela det här systemet finns för att avslöja.
      - name: Faila om körningen var blind
        if: steps.reconcile.outcome != 'success'
        run: |
          echo "::error::Reconcile kunde inte se verkligheten — resultatet är inte tillförlitligt."
          exit 1
