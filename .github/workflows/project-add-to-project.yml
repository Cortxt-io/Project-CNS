# Auto-add nya issues till org-Projektet (ersätter GitHubs UI-only "auto-add"-workflow).
# Fork-/ny-org-återanvändbar: sätt repo/org-variabeln CNS_PROJECT_URL + secret CNS_GITHUB_TOKEN
# (PAT med Projects: Read and write). Inget hårdkodat org-/projektnamn.
name: Add issues to CNS project

on:
  issues:
    types: [opened, reopened, transferred]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    # Hoppa tyst om projektet inte är konfigurerat (t.ex. en fork som inte satt variabeln än).
    if: ${{ vars.CNS_PROJECT_URL != '' }}
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.CNS_PROJECT_URL }}
          github-token: ${{ secrets.CNS_GITHUB_TOKEN }}
